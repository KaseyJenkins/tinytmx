name: CMake macOS

on:
  push:
    branches:
      - master
      - dev
      - modern_project_structure
  pull_request:
    branches:
      - master

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

  # Use a bash shell so we can use the same syntax for environment variable
  # access regardless of the host operating system
defaults:
  run:
    shell: bash

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
        - { name: MacOS XCode,    os: macos-latest   }
    steps:
      - uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: python -m pip install --upgrade pip "conan<3"

      - name: Create default profile
        run: conan profile detect --force

      - name: Install dependencies
        run: conan install . -s build_type=${{env.BUILD_TYPE}} -s compiler.cstd=17 --output-folder=${{github.workspace}}/build --build=missing

      - name: Configure CMake
        run: cmake -S . -B ./build -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/build/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build macOS
        working-directory: ${{github.workspace}}/build
        run: cmake --build . --config ${{env.BUILD_TYPE}} --target install

      - name: Run Test
        run: ${{github.workspace}}/build/tests/tinytmxlibtest
