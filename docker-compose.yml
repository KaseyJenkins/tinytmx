services:
  tinytmx:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      bash -lc "
      /opt/venv/bin/conan install . --output-folder=build -s build_type=Release -s compiler.libcxx=libstdc++11 -s compiler.cppstd=17 --build=missing &&
      cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=/workspace/build/conan_toolchain.cmake &&
      cmake --build build &&
      ctest --test-dir build --output-on-failure
      "
